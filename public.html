<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1D3A;--blue:#2563EB;--blt:#EFF6FF;--bmd:#BFDBFE;
  --green:#059669;--glt:#ECFDF5;--amber:#D97706;--alt:#FFFBEB;
  --red:#DC2626;--rlt:#FEF2F2;--purple:#7C3AED;--plt:#F5F3FF;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g800:#1F2937;
  --w:#fff;--tx:#111827;--t2:#374151;--t3:#6B7280;
  --r:14px;--rs:9px;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shl:0 12px 32px rgba(0,0,0,.12)
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',system-ui,sans-serif;
  background:var(--g100);color:var(--tx);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;-webkit-appearance:none;outline:none}
a{text-decoration:none;color:inherit}
/* Header */
.hdr{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.hdr-in{max-width:680px;margin:0 auto;padding:0 16px;height:56px;display:flex;align-items:center}
.hdr-brand{font-size:17px;font-weight:800;color:var(--w)}
.hdr-brand small{font-size:10px;font-weight:500;color:rgba(255,255,255,.4);margin-left:8px;letter-spacing:.06em;text-transform:uppercase}
.main{max-width:680px;margin:0 auto;padding:18px 14px 80px}
/* Hero */
.hero{background:linear-gradient(145deg,#0B1D3A,#1E3A8A 55%,#2563EB);
  border-radius:var(--r);padding:24px 22px 20px;color:var(--w);margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-24px;top:-32px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-tag{display:inline-flex;align-items:center;background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:10px}
.hero-h{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.25;margin-bottom:6px}
.hero-p{font-size:13px;color:rgba(255,255,255,.72);line-height:1.55}
.hero-stats{display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.hs-n{font-size:22px;font-weight:800}.hs-l{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
/* Filter */
.fbar{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 18px;border-radius:22px;font-size:13px;font-weight:600;border:1.5px solid var(--g200);background:var(--w);color:var(--t3);transition:all .15s;white-space:nowrap}
.chip.on{background:var(--navy);color:var(--w);border-color:var(--navy)}
/* Job Card */
.jc{background:var(--w);border-radius:var(--r);border:1px solid var(--g200);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.jc-head{padding:16px 18px 12px}
.jc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.jc-title{font-size:15px;font-weight:800;color:var(--tx);line-height:1.35;flex:1;word-break:break-all}
.ph{display:inline-flex;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:800;white-space:nowrap;background:var(--rlt);color:var(--red)}
.pm{display:inline-flex;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:800;white-space:nowrap;background:var(--alt);color:var(--amber)}
.pl{display:inline-flex;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:800;white-space:nowrap;background:var(--g100);color:var(--g600)}
.jc-client{font-size:12px;color:var(--t3);margin-bottom:5px;word-break:break-all}
.jc-prod{display:inline-block;background:var(--blt);color:var(--blue);border-radius:5px;padding:2px 9px;font-size:11px;font-weight:700}
.tbar{height:3px;background:var(--g200);border-radius:2px;overflow:hidden;margin-top:10px}
.tfill{height:100%;border-radius:2px}
.jc-strip{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--g100);border-bottom:1px solid var(--g100);background:var(--g50)}
.jsi{padding:11px 16px}.jsi+.jsi{border-left:1px solid var(--g100)}
.jsi-l{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.jsi-v{font-size:14px;font-weight:700;color:var(--t2)}
.jc-body{padding:14px 18px}
.dw{position:relative;margin-bottom:10px}
.dt{font-size:13px;color:var(--t2);line-height:1.75;white-space:pre-line;word-break:break-all}
.dw.col .dt{max-height:72px;overflow:hidden}
.dw.col::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,var(--w))}
.more-btn{font-size:12px;color:var(--blue);font-weight:700;background:none;border:none;padding:4px 0;display:block;margin-top:2px}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:6px;font-size:12px;font-weight:600}
.pg{background:var(--glt);color:var(--green)}.pb2{background:var(--blt);color:var(--blue)}.pp{background:var(--plt);color:var(--purple)}
.guide{background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.guide-hd{font-size:12px;font-weight:800;color:var(--amber);margin-bottom:5px}
.guide-li{font-size:13px;color:var(--g800);line-height:1.65;word-break:break-all}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;background:rgba(11,29,58,.07);color:var(--navy)}
.jc-foot{padding:12px 18px;background:var(--g50);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-top:1px solid var(--g100)}
.dl-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.dl-val{font-size:13px;font-weight:700;color:var(--t2)}
.remain{font-size:11px;font-weight:600;margin-top:2px}
.rok{color:var(--green)}.rwa{color:var(--amber)}.rur{color:var(--red)}
.e-btn{padding:13px 24px;border-radius:var(--rs);font-size:14px;font-weight:800;border:none;white-space:nowrap;display:block;letter-spacing:.01em}
.e-can{background:var(--blue);color:var(--w);box-shadow:0 2px 10px rgba(37,99,235,.32)}
.e-can:active{background:#1D4ED8}
.e-done{text-align:center}
.e-done-n{font-size:11px;color:var(--t3);margin-top:4px;font-weight:600}
.empty{text-align:center;padding:64px 20px;color:var(--t3)}
.empty-ic{font-size:52px;margin-bottom:12px;opacity:.55}
.empty-t{font-size:16px;font-weight:700;color:var(--g600);margin-bottom:6px}
.empty-s{font-size:13px}
/* Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:400;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.modal{background:var(--w);border-radius:22px 22px 0 0;width:100%;max-width:680px;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:su .26s cubic-bezier(.22,.61,.36,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-bar{width:38px;height:4px;background:var(--g200);border-radius:2px;margin:12px auto 0}
.m-head{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g100)}
.m-title{font-size:15px;font-weight:800;color:var(--tx)}
.m-cls{background:var(--g100);border:none;border-radius:50%;width:32px;height:32px;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--g500)}
.m-body{padding:20px}

.field{margin-bottom:16px}
.f-lbl{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:6px;display:block;line-height:1.4}
.f-req{color:var(--red);margin-left:2px}
.f-err{font-size:12px;color:var(--red);font-weight:600;margin-top:4px;display:none}
.f-err.on{display:block}
.f-in{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:14px;color:var(--tx);background:var(--w);transition:border-color .15s,box-shadow .15s;line-height:1.5;-webkit-appearance:none;appearance:none;font-family:inherit}
.f-in:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none}
textarea.f-in{resize:vertical;min-height:88px;line-height:1.65}
.f-wrap{position:relative}
.f-sfx{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--g400);pointer-events:none;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}
/* File upload */
.fz{border:2px dashed var(--g300);border-radius:var(--rs);padding:22px 16px;text-align:center;cursor:pointer;background:var(--g50);position:relative;transition:all .15s}
.fz:hover,.fz.drag{border-color:var(--blue);background:var(--blt)}
.fz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.fz-ic{font-size:28px;margin-bottom:6px}
.fz-t{font-size:13px;font-weight:700;color:var(--g600)}
.fz-s{font-size:11px;color:var(--g400);margin-top:3px}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;background:var(--g50);border:1px solid var(--g200);border-radius:7px;padding:8px 12px;font-size:12px}
.file-nm{flex:1;font-weight:600;color:var(--t2);word-break:break-all;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.file-sz{color:var(--g400);flex-shrink:0;font-size:11px}
.file-del{background:var(--rlt);color:var(--red);border:none;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:800;border:none;text-align:center;cursor:pointer}
.btn-g{background:var(--g100);color:var(--g600);border:1.5px solid var(--g200)}
.btn-s{background:var(--green);color:var(--w)}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g800);color:var(--w);padding:12px 24px;border-radius:26px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shl);white-space:nowrap;transition:transform .3s;pointer-events:none;max-width:calc(100vw - 32px);text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>

/* ── URLからグループID・チャンネルIDを取得 ── */

  try{ var p=new URLSearchParams(location.search); return p.get('g')||null; }catch(e){return null;}
}
function getChannelId(){
  try{ var p=new URLSearchParams(location.search); return p.get('ch')||null; }catch(e){return null;}
}

var currentChannelId = getChannelId();

    + (currentGroupId   ? '&group='+encodeURIComponent(currentGroupId) : '');
  return fetch(url)
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.ok){
        if(isChannel){
          // チャンネルモード：channel_jobsをjobsとして扱う（配信バージョンを表示）
          jobs    = res.data.channel_jobs || [];
          entries = []; // チャンネルページのエントリーは別途取得（応募時にchannelIdを付与）

          var allJobs = res.data.jobs || [];
          jobs = currentGroupId
            ? allJobs.filter(function(j){ return j.groupId === currentGroupId; })
            : (allJobs.length ? allJobs : SAMPLE);
          entries = res.data.entries || [];
        }
      }
      return true;
    })
    .catch(function(){
      jobs = (isChannel ? [] : (currentGroupId ? [] : SAMPLE)); entries = [];
      return false;
    });
}

    body:JSON.stringify({action:'addEntry', entry:entry})
  }).then(function(r){return r.json();});
}

var curF='all', curJid=null, eForm={}, eFiles=[], jobs=[], entries=[];

function isExpired(j){if(!j.deadline)return false;var d=new Date(j.deadline);d.setHours(23,59,59,999);return new Date()>d;}
function daysLeft(j){if(!j.deadline)return null;var d=new Date(j.deadline);d.setHours(23,59,59,999);return Math.ceil((d-new Date())/86400000);}
function barPct(j){if(!j.deadline)return 80;var cr=new Date(j.createdAt),dl=new Date(j.deadline);return Math.max(0,Math.min(100,100-((new Date()-cr)/(dl-cr))*100));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtBytes(b){return b>1048576?(b/1048576).toFixed(1)+'MB':(b/1024).toFixed(0)+'KB';}

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},3200);}

function sbBadge(s){var c=SC[s]||SC.pending;return '<span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;background:'+c.bg+';color:'+c.col+'">'+c.lb+'</span>';}

function tBar(p){var c=p>50?'var(--green)':p>20?'var(--amber)':'var(--red)';return '<div class="tbar"><div class="tfill" style="width:'+p+'%;background:'+c+'"></div></div>';}

/* ── フィルターチップ ── */
document.querySelectorAll('.chip').forEach(function(el){
  el.addEventListener('click', function(){
    curF = this.dataset.f;
    document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
    this.classList.add('on');
    render();
  });
});

/* ── 描画（jobs/entriesはグローバル変数を使用） ── */
function render(){
  var active = jobs.filter(function(j){return !isExpired(j);});
  var vis    = active.filter(function(j){return curF==='all'||j.priority===curF;});
  var now    = new Date();
  document.getElementById('hs-act').textContent = active.length;
  document.getElementById('hs-tot').textContent = jobs.length;
  document.getElementById('hs-upd').textContent = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

  var el = document.getElementById('vlist');
  if(!vis.length){
    el.innerHTML = '<div class="empty"><div class="empty-ic">📭</div><div class="empty-t">現在募集中の案件はありません</div><div class="empty-s">また後でご確認ください</div></div>';
    return;
  }

  var html = '';
  vis.forEach(function(j){
    var dl  = daysLeft(j);
    var urg = dl !== null && dl <= 5;
    var p   = barPct(j);
    var savedMail = sessionStorage.getItem('eml_'+j.id) || '';
    var me = savedMail ? entries.find(function(e){return e.jobId===j.id && e.email===savedMail;}) : null;
    var priHtml = j.priority==='high' ? '<span class="ph">急募</span>' : j.priority==='mid' ? '<span class="pm">通常</span>' : '<span class="pl">低</span>';

    // 採用人数に達したか（採用ステータスの人数でカウント）
    var passedCount = entries.filter(function(e){return e.jobId===j.id && e.status==='passed';}).length;
    var isFull = j.slots && passedCount >= j.slots;

    var remHtml = '';
    if(dl !== null){
      var rc = dl<=3?'rur':dl<=7?'rwa':'rok';
      remHtml = '<div class="remain '+rc+'">残り'+dl+'日</div>';
    }

    var footHtml;
    if(me){
      footHtml = '<div class="e-done">'+sbBadge(me.status)+'<div class="e-done-n">担当者よりご連絡いたします</div></div>';
    }else if(isFull){
      footHtml = '<div class="e-done"><span class="pl" style="padding:6px 14px">🈵 募集終了</span><div class="e-done-n">採用枠が埋まりました</div></div>';
    }else{
      footHtml = '<button class="e-btn e-can" data-jid="'+esc(j.id)+'">エントリーする →</button>';
    }

    var pillHtml = '';
    if(j.budget || j.followerRange || j.url){
      pillHtml = '<div class="pill-row">';
      if(j.budget)       pillHtml += '<span class="pill pg">💰 '+esc(j.budget)+'</span>';
      if(j.followerRange) pillHtml += '<span class="pill pb2">👥 '+esc(j.followerRange)+'</span>';
      if(j.url)          pillHtml += '<a href="'+j.url+'" target="_blank" rel="noopener" class="pill pp">🔗 公式サイト</a>';
      pillHtml += '</div>';
    }

    var guideHtml = '';
    if(j.entryGuide){
      guideHtml = '<div class="guide"><div class="guide-hd">📌 エントリー前にご確認ください</div>';
      j.entryGuide.split('\n').forEach(function(l){guideHtml += '<div class="guide-li">'+esc(l)+'</div>';});
      guideHtml += '</div>';
    }

    var tagHtml = '';
    if(j.tags && j.tags.length){
      tagHtml = '<div class="tag-row">';
      j.tags.forEach(function(t){tagHtml += '<span class="tag">#'+esc(t)+'</span>';});
      tagHtml += '</div>';
    }

    html +=
      '<div class="jc">'+
        '<div class="jc-head">'+
          '<div class="jc-top"><div class="jc-title">'+esc(j.title)+'</div>'+priHtml+'</div>'+
          '<div class="jc-client">'+esc(j.client)+(j.product?' ／ <span class="jc-prod">'+esc(j.product)+'</span>':'')+'</div>'+
          (j.deadline ? tBar(p) : '')+
        '</div>'+
        '<div class="jc-strip">'+
          '<div class="jsi"><div class="jsi-l">採用人数</div><div class="jsi-v">👥 '+j.slots+'名</div></div>'+
          '<div class="jsi"><div class="jsi-l">稼働日</div><div class="jsi-v">📅 '+esc(j.workdate||'未定')+'</div></div>'+
        '</div>'+
        '<div class="jc-body">'+
          (j.desc ?
            '<div class="dw col" data-id="'+esc(j.id)+'"><div class="dt">'+esc(j.desc)+'</div></div>'+
            '<button class="more-btn" data-id="'+esc(j.id)+'">▼ 詳細を見る</button>'
          : '')+
          pillHtml + guideHtml + tagHtml+
        '</div>'+
        '<div class="jc-foot">'+
          '<div><div class="dl-lbl">締切日</div><div class="dl-val'+(urg?' rur':'')+'">'+esc(j.deadline||'未設定')+'</div>'+remHtml+'</div>'+
          '<div>'+footHtml+'</div>'+
        '</div>'+
      '</div>';
  });

  el.innerHTML = html;

  /* イベント：エントリーボタン */
  el.querySelectorAll('.e-can').forEach(function(btn){
    btn.addEventListener('click', function(){openEov(this.dataset.jid);});
  });

  /* イベント：詳細トグル */
  el.querySelectorAll('.more-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.id;
      var dw = el.querySelector('.dw[data-id="'+id+'"]');
      if(!dw) return;
      if(dw.classList.contains('col')){dw.classList.remove('col');this.textContent='▲ 閉じる';}
      else{dw.classList.add('col');this.textContent='▼ 詳細を見る';}
    });
  });
}

/* フォームヘルパー */
function addSecTitle(parent, text){
  var d = document.createElement('div'); d.className = 'sec-t'; d.style.marginTop = parent.children.length ? '6px' : '0'; d.textContent = text; parent.appendChild(d);
}
function addField(parent, label, type, id, ph, key, required){
  var wrap = document.createElement('div'); wrap.className = 'field';
  var lbl = document.createElement('label'); lbl.className = 'f-lbl';
  lbl.textContent = label; if(required){var req = document.createElement('span'); req.className = 'f-req'; req.textContent = ' *'; lbl.appendChild(req);}
  var inp = document.createElement('input'); inp.className = 'f-in'; inp.type = type; inp.id = id; inp.placeholder = ph;
  inp.addEventListener('input', function(){eForm[key] = this.value;});
  wrap.appendChild(lbl); wrap.appendChild(inp);
  parent.appendChild(wrap);
}
function addFieldNum(parent, label, id, ph, key, suffix){
  var wrap = document.createElement('div'); wrap.className = 'field';
  var lbl = document.createElement('label'); lbl.className = 'f-lbl'; lbl.textContent = label;
  var fw = document.createElement('div'); fw.className = 'f-wrap';
  var inp = document.createElement('input'); inp.className = 'f-in'; inp.type = 'number'; inp.id = id; inp.placeholder = ph; inp.style.paddingRight = '40px';
  inp.addEventListener('input', function(){eForm[key] = this.value;});
  var sfx = document.createElement('span'); sfx.className = 'f-sfx'; sfx.textContent = suffix;
  fw.appendChild(inp); fw.appendChild(sfx);
  wrap.appendChild(lbl); wrap.appendChild(fw);
  parent.appendChild(wrap);
}
function addTextarea(parent, label, key, required){
  var wrap = document.createElement('div'); wrap.className = 'field';
  var lbl = document.createElement('label'); lbl.className = 'f-lbl';
  lbl.textContent = label; if(required){var req = document.createElement('span'); req.className = 'f-req'; req.textContent = ' *'; lbl.appendChild(req);}
  var ta = document.createElement('textarea'); ta.className = 'f-in'; ta.rows = key==='note' ? 5 : 3;
  ta.placeholder = label + ' を入力してください';
  ta.addEventListener('input', function(){
    if(key === 'note'){ eForm.note = this.value; }
    else { if(!eForm.extra) eForm.extra = {}; eForm.extra[label] = this.value; }
  });
  wrap.appendChild(lbl); wrap.appendChild(ta);
  parent.appendChild(wrap);
}
function addErrDiv(parent, id){
  var d = document.createElement('div'); d.className = 'f-err'; d.id = id;
  if(id==='err-name') d.textContent = '必須項目です';
  if(id==='err-email') d.textContent = '正しいメールアドレスを入力してください';
  parent.appendChild(d);
}

/* ── コンポジ専用フィールド（eForm.composite に格納） ── */
function setComp(key, val){ if(!eForm.composite) eForm.composite = {}; eForm.composite[key] = val; }

function addCompField(parent, label, type, key, ph, suffix, required){
  var wrap = document.createElement('div'); wrap.className = 'field';
  var lbl = document.createElement('label'); lbl.className = 'f-l'; lbl.textContent = label;
  if(required){ var rq=document.createElement('span'); rq.className='f-req'; rq.textContent=' *'; lbl.appendChild(rq); }
  var inp;
  if(suffix){
    var fw=document.createElement('div'); fw.className='f-wr';
    inp=document.createElement('input'); inp.className='f-in'; inp.type=type; inp.placeholder=ph; inp.style.paddingRight='40px';
    inp.setAttribute('data-comp', key);
    var sx=document.createElement('span'); sx.className='f-sx'; sx.textContent=suffix;
    fw.appendChild(inp); fw.appendChild(sx);
    wrap.appendChild(lbl); wrap.appendChild(fw);
  }else{
    inp=document.createElement('input'); inp.className='f-in'; inp.type=type; inp.placeholder=ph;
    inp.setAttribute('data-comp', key);
    wrap.appendChild(lbl); wrap.appendChild(inp);
  }
  inp.addEventListener('input', function(){ setComp(key, this.value); });
  parent.appendChild(wrap);
}

function addCompFieldFull(parent, label, type, key, ph, required){
  addCompField(parent, label, type, key, ph, '', required);
}

function addCompTextarea(parent, label, key, ph, required){
  var wrap = document.createElement('div'); wrap.className = 'field';
  var lbl = document.createElement('label'); lbl.className = 'f-l'; lbl.textContent = label;
  if(required){ var rq=document.createElement('span'); rq.className='f-req'; rq.textContent=' *'; lbl.appendChild(rq); }
  var ta = document.createElement('textarea'); ta.className='f-in'; ta.rows=2; ta.placeholder=ph;
  ta.setAttribute('data-comp', key);
  ta.addEventListener('input', function(){ setComp(key, this.value); });
  wrap.appendChild(lbl); wrap.appendChild(ta);
  parent.appendChild(wrap);
}

/* ── ファイル処理 ── */
function handleFiles(files){
  var arr = Array.from(files), rem = 5 - eFiles.length, add = arr.slice(0, rem);
  add.forEach(function(f){
    if(f.size > 10485760){ showToast('⚠️ '+f.name+' は10MBを超えています'); return; }
    var r = new FileReader();
    r.onload = function(ev){ eFiles.push({name:f.name, size:f.size, type:f.type, data:ev.target.result}); renderFileList(); };
    r.readAsDataURL(f);
  });
  if(arr.length > rem) showToast('ファイルは最大5件まで添付できます');
}
function renderFileList(){
  var el = document.getElementById('file-list'); if(!el) return;
  el.innerHTML = '';
  eFiles.forEach(function(f, i){
    var ic = f.type && f.type.startsWith('image/') ? '🖼️' : f.type && f.type.includes('pdf') ? '📄' : '📎';
    var item = document.createElement('div'); item.className = 'file-item';
    item.innerHTML = '<span style="font-size:15px">'+ic+'</span><span class="file-nm">'+esc(f.name)+'</span><span class="file-sz">'+fmtBytes(f.size)+'</span>';
    var del = document.createElement('button'); del.className = 'file-del'; del.textContent = '削除'; del.dataset.i = i;
    del.addEventListener('click', function(){eFiles.splice(parseInt(this.dataset.i),1); renderFileList();});
    item.appendChild(del); el.appendChild(item);
  });
}

/* ── 送信（GASへエントリーを送信） ── */
function submitEntry(){
  var name = (eForm.name || '').trim(), email = (eForm.email || '').trim();
  var ok = true;
  var errName = document.getElementById('err-name'), errMail = document.getElementById('err-email');
  if(!name){ errName.classList.add('on'); ok = false; } else errName.classList.remove('on');
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errMail.classList.add('on'); ok = false; } else errMail.classList.remove('on');
  if(!ok){ showToast('⚠️ 必須項目を入力してください'); return; }

  if(!gasConfigured()){ showToast('⚠️ サーバー未設定のため送信できません（管理者にお問い合わせください）'); return; }

  // コンポジ必須チェック
  var curJob = jobs.find(function(x){return x.id===curJid;});
  if(curJob && curJob.composite === 'required'){
    var c = eForm.composite || {};
    if(!(c.comp_age && String(c.comp_age).trim()) || !(c.comp_area && String(c.comp_area).trim())){
      showToast('⚠️ コンポジ情報（年齢・居住エリア）は必須です');
      return;
    }
  }

  // 添付の合計サイズチェック（GASの処理上限・タイムアウト対策：合計20MBまで）
  var totalSize = 0;
  for(var i=0;i<eFiles.length;i++){ totalSize += (eFiles[i].size||0); }
  if(totalSize > 20971520){
    showToast('⚠️ 添付ファイルの合計が大きすぎます（20MB以内にしてください）');
    return;
  }

  var entry = {id:'e'+Date.now(), jobId:curJid, status:'pending', submittedAt:new Date().toISOString(),
    name:name, email:email, phone:eForm.phone||'', dob:eForm.dob||'', height:eForm.height||'',
    tiktok:eForm.tiktok||'', tt_followers:eForm.tt_followers||'', tt_avg10:eForm.tt_avg10||'',
    ig_url:eForm.ig_url||'', ig_followers:eForm.ig_followers||'', ig_reach10:eForm.ig_reach10||'',
    note:eForm.note||'', extra:eForm.extra||{}, composite:eForm.composite||{}, attachments:eFiles.slice()};

  var sendBtn = document.querySelector('.btn-s');
  if(sendBtn){ sendBtn.disabled = true; sendBtn.textContent = '送信中...'; }

  postEntry(entry).then(function(res){
    if(res && res.ok){
      sessionStorage.setItem('eml_'+curJid, email);
      var jobTitle = '';
      var jj = jobs.find(function(x){return x.id===curJid;});
      if(jj) jobTitle = jj.title;
      closeEov();
      fetchData().then(render);
      showDoneScreen(res.entry || entry, jobTitle);
    }else if(res && res.duplicate){
      if(sendBtn){ sendBtn.disabled = false; sendBtn.textContent = '送信する ✅'; }
      showToast('⚠️ この案件には既に同じメールアドレスで応募済みです');
    }else{
      if(sendBtn){ sendBtn.disabled = false; sendBtn.textContent = '送信する ✅'; }
      showToast('⚠️ 送信に失敗しました。時間をおいて再度お試しください。');
    }
  }).catch(function(){
    if(sendBtn){ sendBtn.disabled = false; sendBtn.textContent = '送信する ✅'; }
    showToast('⚠️ 通信エラーが発生しました。電波状況をご確認ください。');
  });
}

/* ── 応募完了画面（受付番号・次のステップを表示） ── */
function showDoneScreen(entry, jobTitle){
  var ov = document.getElementById('eov');
  var efi = document.getElementById('efi');
  document.querySelector('#eov .m-title').textContent = '✅ 応募が完了しました';
  efi.innerHTML =
    '<div style="text-align:center;padding:10px 4px 4px">'+
      '<div style="font-size:54px;margin-bottom:8px">🎉</div>'+
      '<div style="font-size:18px;font-weight:800;color:var(--tx);margin-bottom:6px">ご応募ありがとうございます</div>'+
      '<div style="font-size:13px;color:var(--t3);line-height:1.7;margin-bottom:18px">エントリーを受け付けました。<br>ご登録のメールアドレスに受付確認メールをお送りしました。</div>'+
    '</div>'+
    '<div style="background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:16px;margin-bottom:16px">'+
      '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--g200)"><span style="font-size:12px;color:var(--t3);font-weight:700">応募案件</span><span style="font-size:13px;color:var(--tx);font-weight:700;text-align:right;max-width:60%">'+esc(jobTitle)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--g200)"><span style="font-size:12px;color:var(--t3);font-weight:700">受付番号</span><span style="font-size:13px;color:var(--tx);font-weight:700">'+esc(entry.id)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:12px;color:var(--t3);font-weight:700">お名前</span><span style="font-size:13px;color:var(--tx);font-weight:700">'+esc(entry.name)+'</span></div>'+
    '</div>'+
    '<div style="background:var(--blt);border:1px solid var(--bmd);border-radius:var(--rs);padding:14px 16px;margin-bottom:18px">'+
      '<div style="font-size:12px;font-weight:800;color:var(--blue);margin-bottom:8px">📌 今後の流れ</div>'+
      '<div style="font-size:13px;color:var(--t2);line-height:1.8">1. 担当者が応募内容を確認します<br>2. 選考結果をメールでご連絡します<br>3. 結果が出るまでお待ちください</div>'+
    '</div>'+
    '<button class="btn btn-s" id="done-close" style="width:100%">閉じる</button>';
  document.getElementById('done-close').addEventListener('click', function(){
    closeEov();
    document.querySelector('#eov .m-title').textContent = '📝 エントリーフォーム';
  });
  ov.classList.add('on');
}

/* ── 初期化（GASからデータ取得して描画） ── */
function init(){
  if(!gasConfigured()){
    // GAS未設定時はサンプルを表示
    jobs = SAMPLE; entries = [];
    render();
    return;
  }
  fetchData().then(render);
}

init();
// 60秒ごとに最新データへ自動更新
setInterval(function(){ if(gasConfigured()){ fetchData().then(render); } }, 60000);
</script>
